<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carta de um Diabo a seu Aprendiz</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff" id="meta-theme-color">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/open-book.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        sepia: {
                            bg: '#fbf0d9',
                            text: '#5f4b32',
                            bar: '#f3e5c8'
                        }
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        /* Transições globais suaves */
        body { transition: background-color 0.4s ease, color 0.4s ease; }
        
        /* Estilos do Canvas do PDF */
        #pdf-render {
            direction: ltr;
            max-width: 100%;
            height: auto !important;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            transition: filter 0.4s ease, opacity 0.3s ease;
        }

        /* Efeitos Visuais para os Temas no PDF */
        body.theme-dark #pdf-render {
            filter: invert(0.85) hue-rotate(180deg) contrast(0.95);
        }
        body.theme-sepia #pdf-render {
            filter: sepia(0.4) contrast(0.9) brightness(0.9);
        }

        /* Oculta as setas do input de número */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }
        body.theme-dark .glass {
            background: rgba(31, 41, 55, 0.85);
            border-color: rgba(255,255,255,0.05);
        }
        body.theme-sepia .glass {
            background: rgba(243, 229, 200, 0.9);
            border-color: rgba(95, 75, 50, 0.1);
        }

        /* Animação de entrada da página */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .page-anim { animation: fadeUp 0.4s ease-out forwards; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 4px; }
        body.theme-dark ::-webkit-scrollbar-thumb { background: rgba(75, 85, 99, 0.5); }
    </style>
</head>

<!-- Classes padrão (Tema Claro) -->
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col font-sans overflow-hidden theme-light">

    <!-- Tela de Carregamento Elegante -->
    <div id="loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white dark:bg-gray-900 transition-opacity duration-500">
        <div class="relative w-16 h-16">
            <i class="fa-solid fa-book-journal-whills text-4xl text-blue-600 dark:text-blue-400 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></i>
            <div class="absolute inset-0 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
        </div>
        <h2 class="mt-6 font-serif text-xl font-semibold text-gray-800 dark:text-gray-200">Preparando sua leitura...</h2>
        <p class="text-sm text-gray-500 mt-2">C.S. Lewis</p>
    </div>

    <!-- Cabeçalho (Navbar) -->
    <header class="glass fixed top-0 w-full z-40 shadow-sm transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex justify-between items-center">
            
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center shadow-md">
                    <i class="fa-solid fa-book text-sm"></i>
                </div>
                <div class="hidden sm:block">
                    <h1 class="font-serif font-semibold text-lg leading-tight truncate">Cartas de um Diabo a seu Aprendiz</h1>
                    <p class="text-[11px] uppercase tracking-wider text-gray-500 font-medium">C.S. Lewis</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-2 sm:space-x-4">
                
                <!-- Botão Instalar PWA -->
                <button id="install-button" class="hidden flex items-center gap-2 px-4 py-1.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white text-sm font-medium rounded-full shadow-md transition-transform hover:scale-105">
                    <i class="fa-solid fa-download"></i> <span class="hidden sm:inline">Instalar App</span>
                </button>

                <!-- Seletor de Temas -->
                <div class="flex bg-gray-200/50 dark:bg-gray-700/50 p-1 rounded-full border border-gray-300/30">
                    <button class="theme-btn w-8 h-8 rounded-full flex items-center justify-center text-gray-600 hover:bg-white hover:shadow-sm transition-all" data-theme="light" title="Modo Claro">
                        <i class="fa-solid fa-sun text-sm"></i>
                    </button>
                    <button class="theme-btn w-8 h-8 rounded-full flex items-center justify-center text-yellow-700 hover:bg-[#fbf0d9] hover:shadow-sm transition-all" data-theme="sepia" title="Modo Sépia">
                        <i class="fa-solid fa-mug-hot text-sm"></i>
                    </button>
                    <button class="theme-btn w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:bg-gray-800 hover:text-white hover:shadow-sm transition-all" data-theme="dark" title="Modo Escuro">
                        <i class="fa-solid fa-moon text-sm"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Área Principal de Leitura -->
    <main class="flex-1 overflow-y-auto pt-20 pb-24 relative" id="main-container">
        <div class="flex justify-center px-4 sm:px-8 min-h-full items-start">
            <div class="relative group">
                <!-- Canvas onde o livro é renderizado -->
                <canvas id="pdf-render" class="bg-white opacity-0"></canvas>
            </div>
        </div>
    </main>

    <!-- Barra de Controles Inferior -->
    <nav class="glass fixed bottom-0 w-full z-40 transition-colors duration-300">
        <!-- Barra de Progresso de Leitura -->
        <div class="h-1 w-full bg-gray-200 dark:bg-gray-700 absolute top-0 left-0">
            <div id="read-progress" class="h-full bg-blue-500 transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            
            <!-- Controle de Zoom -->
            <div class="flex items-center gap-1 sm:gap-2">
                <button id="zoom-out" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-600 hover:bg-gray-200/50 dark:text-gray-300 dark:hover:bg-gray-700/50 transition">
                    <i class="fa-solid fa-minus text-sm"></i>
                </button>
                <span id="zoom-level" class="text-xs font-medium w-12 text-center text-gray-500 uppercase tracking-wider">120%</span>
                <button id="zoom-in" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-600 hover:bg-gray-200/50 dark:text-gray-300 dark:hover:bg-gray-700/50 transition">
                    <i class="fa-solid fa-plus text-sm"></i>
                </button>
            </div>

            <!-- Controle de Páginas -->
            <div class="flex items-center bg-gray-200/50 dark:bg-gray-700/50 rounded-full p-1 border border-gray-300/30">
                <button id="prev-page" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white dark:hover:bg-gray-600 hover:shadow-sm disabled:opacity-30 transition">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                
                <div class="flex items-center px-3 text-sm font-medium">
                    <input type="number" id="page-num" class="w-10 text-center bg-transparent focus:outline-none focus:ring-0 p-0" value="1" min="1">
                    <span class="mx-1 text-gray-400">de</span>
                    <span id="page-count" class="text-gray-600 dark:text-gray-300">--</span>
                </div>

                <button id="next-page" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white dark:hover:bg-gray-600 hover:shadow-sm disabled:opacity-30 transition">
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </nav>

    <script>
        const url = './Cartas-de-Um-Diabo-a-Seu-Aprend-C.-S.-Lewis.pdf';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumIsPending = null,
            scale = 1.2;

        const canvas = document.getElementById('pdf-render');
        const ctx = canvas.getContext('2d');
        const mainContainer = document.getElementById('main-container');
        const progressBar = document.getElementById('read-progress');
        const loader = document.getElementById('loader');

        // Atualizar barra de progresso
        const updateProgress = () => {
            if (!pdfDoc) return;
            const percentage = (pageNum / pdfDoc.numPages) * 100;
            progressBar.style.width = `${percentage}%`;
        };

        const renderPage = num => {
            pageIsRendering = true;
            canvas.classList.remove('page-anim'); // Reseta animação
            
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale });
                const outputScale = window.devicePixelRatio || 1;
                
                canvas.width = Math.floor(viewport.width * outputScale);
                canvas.height = Math.floor(viewport.height * outputScale);
                canvas.style.width = Math.floor(viewport.width) + "px";
                canvas.style.height =  Math.floor(viewport.height) + "px";

                const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

                const renderCtx = { canvasContext: ctx, transform: transform, viewport: viewport };

                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;
                    
                    // Mostra o canvas com animação suave
                    canvas.classList.add('page-anim');
                    canvas.style.opacity = '1';
                    
                    // Esconde a tela de carregamento na primeira renderização
                    if (!loader.classList.contains('hidden')) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.classList.add('hidden'), 500);
                    }

                    if (pageNumIsPending !== null) {
                        renderPage(pageNumIsPending);
                        pageNumIsPending = null;
                    }
                });

                document.getElementById('page-num').value = num;
                document.getElementById('prev-page').disabled = num <= 1;
                document.getElementById('next-page').disabled = num >= pdfDoc.numPages;
                
                updateProgress();
                mainContainer.scrollTop = 0; // Volta para o topo suavemente
            });
        };

        const queueRenderPage = num => {
            if (pageIsRendering) pageNumIsPending = num;
            else renderPage(num);
        };

        const showPrevPage = () => { if (pageNum > 1) { pageNum--; queueRenderPage(pageNum); } };
        const showNextPage = () => { if (pageNum < pdfDoc.numPages) { pageNum++; queueRenderPage(pageNum); } };

        const updateZoom = (newScale) => {
            scale = newScale;
            document.getElementById('zoom-level').textContent = Math.round(scale * 100) + '%';
            if (pdfDoc) queueRenderPage(pageNum);
        };

        // Carregar Documento
        pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
            pdfDoc = pdfDoc_;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            
            // Tenta recuperar a última página lida (opcional e bem legal!)
            const savedPage = localStorage.getItem('lastReadPage');
            if (savedPage && parseInt(savedPage) <= pdfDoc.numPages) {
                pageNum = parseInt(savedPage);
            }
            
            renderPage(pageNum);
        }).catch(err => {
            loader.innerHTML = `
                <i class="fa-solid fa-triangle-exclamation text-4xl text-red-500 mb-4"></i>
                <h2 class="text-xl font-semibold text-gray-800">Erro ao carregar o livro</h2>
                <p class="text-sm text-gray-500 mt-2 text-center px-4">Verifique se o arquivo PDF está no GitHub com o nome exato.</p>
            `;
            console.error(err);
        });

        // Eventos
        document.getElementById('prev-page').addEventListener('click', showPrevPage);
        document.getElementById('next-page').addEventListener('click', showNextPage);
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') showNextPage();
            if (e.key === 'ArrowLeft') showPrevPage();
        });

        document.getElementById('zoom-in').addEventListener('click', () => { if(scale < 3) updateZoom(scale + 0.2); });
        document.getElementById('zoom-out').addEventListener('click', () => { if(scale > 0.6) updateZoom(scale - 0.2); });

        document.getElementById('page-num').addEventListener('change', (e) => {
            let num = parseInt(e.target.value);
            if (num > 0 && num <= pdfDoc.numPages) {
                pageNum = num;
                queueRenderPage(pageNum);
            } else {
                e.target.value = pageNum;
            }
        });

        // Salvar a página antes de fechar a aba
        window.addEventListener('beforeunload', () => {
            if (pdfDoc) localStorage.setItem('lastReadPage', pageNum);
        });

        // ==========================================
        // SISTEMA DE TEMAS (Claro, Escuro, Sépia)
        // ==========================================
        const body = document.body;
        const metaThemeColor = document.getElementById('meta-theme-color');
        const themeBtns = document.querySelectorAll('.theme-btn');

        const applyTheme = (theme) => {
            // Remove as classes antigas
            body.classList.remove('theme-light', 'theme-dark', 'theme-sepia', 'dark', 'bg-slate-50', 'bg-slate-900', 'bg-sepia-bg', 'text-slate-800', 'text-slate-300', 'text-sepia-text');
            
            // Adiciona a nova estrutura baseada no tema
            if (theme === 'dark') {
                body.classList.add('theme-dark', 'dark', 'bg-slate-900', 'text-slate-300');
                metaThemeColor.setAttribute('content', '#1f2937');
            } else if (theme === 'sepia') {
                body.classList.add('theme-sepia', 'bg-sepia-bg', 'text-sepia-text');
                metaThemeColor.setAttribute('content', '#f3e5c8');
            } else {
                body.classList.add('theme-light', 'bg-slate-50', 'text-slate-800');
                metaThemeColor.setAttribute('content', '#ffffff');
            }

            // Atualiza botões
            themeBtns.forEach(btn => {
                btn.classList.remove('ring-2', 'ring-blue-500', 'scale-110');
                if (btn.dataset.theme === theme) btn.classList.add('ring-2', 'ring-blue-500', 'scale-110');
            });

            localStorage.setItem('reader_theme', theme);
        };

        // Carregar tema salvo ou padrão do sistema
        const savedTheme = localStorage.getItem('reader_theme');
        if (savedTheme) {
            applyTheme(savedTheme);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            applyTheme('dark');
        } else {
            applyTheme('light');
        }

        themeBtns.forEach(btn => {
            btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
        });

        // ==========================================
        // LÓGICA DO PWA (Mantida e melhorada)
        // ==========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW:', err));
            });
        }

        let deferredPrompt;
        const installButton = document.getElementById('install-button');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installButton.classList.remove('hidden'); // Revela o botão chique
        });

        installButton.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            installButton.classList.add('hidden');
        });

        window.addEventListener('appinstalled', () => {
            installButton.classList.add('hidden');
        });
    </script>
</body>
</html>
